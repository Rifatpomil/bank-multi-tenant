spring.application.name=Bank Multi-Tenant

spring.h2.console.enabled=true

# Snapshotting (see docs/SNAPSHOTTING.md)
axon.snapshotting.enabled=false
axon.snapshotting.bank-account.threshold=50

# Projection rebuild endpoint - requires HTTP Basic auth (admin/admin) when enabled
axon.admin.rebuild-enabled=false
axon.admin.username=admin
axon.admin.password=admin