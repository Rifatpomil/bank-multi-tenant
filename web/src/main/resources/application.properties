spring.application.name=Bank Multi-Tenant

spring.h2.console.enabled=true

# Snapshotting (see docs/SNAPSHOTTING.md)
axon.snapshotting.enabled=false
axon.snapshotting.bank-account.threshold=50

# Projection rebuild endpoint - requires HTTP Basic auth (admin/admin) when enabled
axon.admin.rebuild-enabled=false
axon.admin.username=admin
axon.admin.password=admin

# Database Configuration (Using Docker MySQL on 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/bank_multitenant?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update

# Spring AI - OpenAI Configuration
# Replace with your real OpenAI API Key (or set OPENAI_API_KEY env var)
spring.ai.openai.api-key=${OPENAI_API_KEY:REPLACE_WITH_REAL_KEY}
spring.ai.openai.chat.options.model=gpt-4o

# Spring Boot Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Logging Configuration
logging.level.org.axonframework=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n